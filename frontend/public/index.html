<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Atlas SatelliteMap — Live Company Earth</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <link rel="stylesheet" href="/static/site.css" />
  </head>
  <body>
    <div class="app-shell">
      <main class="main-panel">
        <section class="hud glass">
          <div>
            <h1>🛰️ Atlas SatelliteMap</h1>
            <p>Live stock and Bitcoin data, mapped to real HQ coordinates on Earth.</p>
          </div>
          <div class="hud-actions">
            <input id="search" type="text" placeholder="Search company or symbol" />
            <select id="region-filter">
              <option value="">All countries</option>
            </select>
            <button id="refresh-btn">Refresh Live Data</button>
          </div>
        </section>

        <section class="map-wrap glass">
          <div id="map"></div>
          <aside class="live-panel">
            <h2>Market Pulse</h2>
            <div id="pulse-cards" class="pulse-cards"></div>
            <h3>Top Movers</h3>
            <div id="movers" class="movers"></div>
          </aside>
        </section>
      </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="/static/app.js"></script>
  </body>
</html>
