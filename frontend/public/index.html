<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Atlas of Value — Global Company Intelligence</title>
    <link rel="stylesheet" href="/static/site.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="left-panel glass">
        <h1>🌍 Atlas of Value</h1>
        <p class="subtitle">Company-level global wealth command center.</p>

        <div class="filter-group">
          <label>Search company</label>
          <input id="q" type="text" placeholder="Name or symbol" />
          <div id="suggestions" class="suggestions"></div>
        </div>

        <div class="filter-grid">
          <div class="filter-group">
            <label>Sector</label>
            <select id="sector"><option value="">All</option></select>
          </div>
          <div class="filter-group">
            <label>Country</label>
            <select id="country"><option value="">All</option></select>
          </div>
        </div>

        <div class="filter-group">
          <label>Minimum market cap (USD)</label>
          <input id="min_market_cap" type="number" value="0" step="1000000000" />
        </div>

        <button id="apply-btn">Apply Filters</button>
      </aside>

      <main class="main-panel">
        <section class="kpis" id="kpis"></section>

        <section class="glass">
          <div class="section-header">
            <h2>Sector Dominance</h2>
          </div>
          <div id="sector-chart" class="chart"></div>
        </section>

        <section class="glass two-col">
          <div>
            <h2>Country Context (Public Data)</h2>
            <div class="table-wrap">
              <table id="country-table">
                <thead>
                  <tr>
                    <th>Country</th>
                    <th>GDP (T USD)</th>
                    <th>Population (M)</th>
                    <th>HDI</th>
                  </tr>
                </thead>
                <tbody></tbody>
              </table>
            </div>
          </div>
          <div>
            <h2>Connected Open Sources</h2>
            <ul id="sources-list" class="source-list"></ul>
          </div>
        </section>

        <section class="glass">
          <div class="section-header">
            <h2>Company Directory</h2>
            <div class="pagination" id="pagination"></div>
          </div>
          <div class="table-wrap">
            <table id="companies-table">
              <thead>
                <tr>
                  <th>Symbol</th>
                  <th>Company</th>
                  <th>Sector</th>
                  <th>Country</th>
                  <th>Employees</th>
                  <th>Market Cap</th>
                  <th>Revenue</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
